services:
  - type: web
    name: sihan-cloud-drive
    runtime: python
    plan: starter
    rootDir: my-project
    buildCommand: pip install -r requirements.txt
    startCommand: python cloud_drive_server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CLOUD_DRIVE_ROOT
        value: /opt/render/project/src/render-disk
      - key: CLOUD_DRIVE_UPLOAD_PASSWORD
        sync: false
    disk:
      name: render-disk
      mountPath: /opt/render/project/src/render-disk
      sizeGB: 10
