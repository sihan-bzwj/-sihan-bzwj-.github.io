site_name: Sihan's Blog
site_description: Notes, tools, and the cloud drive I keep online | 个人笔记、工具与云盘入口
site_author: Sihan
site_url: https://sihan-bzwj.github.io/
repo_url: https://github.com/sihan-bzwj/sihan-bzwj.github.io
repo_name: sihan-bzwj.github.io

theme:
  name: material
  language: zh
  font: false

markdown_extensions:
  - pymdownx.emoji
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - attr_list
  - tables

extra_css:
  - stylesheets/fonts.css
  - stylesheets/tokens.css
  - stylesheets/base.css
  - stylesheets/components.css
  - stylesheets/pages.css

extra_javascript:
  - javascripts/theme-toggle.js
  - javascripts/reveal.js

nav:
  - 首页 / Home: index.md
  - 云盘 / Cloud Drive: cloud-drive.md
