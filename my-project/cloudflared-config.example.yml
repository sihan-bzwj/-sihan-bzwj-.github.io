# Optional reference for locally managed tunnels.
# The live server now uses a dashboard-managed token tunnel instead.
tunnel: YOUR_TUNNEL_ID
credentials-file: /home/azureuser/.cloudflared/YOUR_TUNNEL_ID.json

ingress:
  - hostname: ai.example.com
    service: http://127.0.0.1:8080
  - hostname: drive.example.com
    service: http://127.0.0.1:8080/cloud-drive
  - service: http_status:404
